<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referencia</title>

<style>
body{
  background:#0b0b0b;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1{
  margin-top:40px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:50px;
}

.gallery img{
  width:100%;
  border-radius:12px;
  transition:0.3s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Referencia</h1>

<div class="gallery">
<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
</div>

</body>
</html>
